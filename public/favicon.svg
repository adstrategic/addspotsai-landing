<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D1F3C"/>
      <stop offset="100%" stop-color="#050D1A"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ECDC4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ECDC4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Glow effect -->
  <circle cx="50" cy="50" r="38" fill="url(#glowCenter)"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="34" fill="none" stroke="#4ECDC4" stroke-width="3" opacity="0.9"/>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="24" fill="none" stroke="#4ECDC4" stroke-width="1.5" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="5" fill="#4ECDC4" opacity="0.9"/>

  <!-- Radar/wheel segments (like the AddSpot icon O) -->
